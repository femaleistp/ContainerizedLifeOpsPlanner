services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SA_PASSWORD}"
    ports:
      - "14333:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P $$MSSQL_SA_PASSWORD -C -Q \"SELECT 1\" > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  app:
    build: .
    environment:
      ConnectionStrings__DefaultConnection: "${ConnectionStrings__DefaultConnection}"
    depends_on:
      db:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        until /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "$${SA_PASSWORD}" -C -Q "SELECT 1" > /dev/null 2>&1; do
          echo "waiting for sql..."
          sleep 2
        done
        dotnet LifeOpsPlanner_Project.dll

volumes:
  mssql_data: